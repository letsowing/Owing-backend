spring:
  config:
    import: optional:file:.env[.properties]
    activate:
      on-profile: local, dev, prod

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/owing
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update

---

spring:
  config:
    import: optional:file:.env[.properties]
    activate:
      on-profile: test

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST_TEST}:${POSTGRES_PORT_TEST}/owing
    username: ${POSTGRES_USERNAME_TEST}
    password: ${POSTGRES_PASSWORD_TEST}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
