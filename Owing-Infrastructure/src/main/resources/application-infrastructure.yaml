spring:
  config:
    import: optional:file:.env[.properties]
    activate:
      on-profile: local
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 5000

---

spring:
  config:
    import: optional:file:.env[.properties]
    activate:
      on-profile: test
  data:
    redis:
      host: ${REDIS_HOST_TEST}
      port: ${REDIS_PORT_TEST}
      password: ${REDIS_PASSWORD_TEST}
      timeout: 5000

---

cloud:
  aws:
    region: ${AWS_REGION}
    credentials:
      accessKey: ${IAM_ACCESS_KEY}
      secretKey: ${IAM_SECRET_KEY}
  s3:
    bucket: ${S3_BUCKET}
    directory:
      project: ${DIRECTORY_PROJECT}
      cast: ${DIRECTORY_CAST}
      universe: ${DIRECTORY_UNIVERSE}
  stack-auto: false

management:
  endpoints:
    web:
      exposure:
        include: health, beans, httpexchanges, info, metrics, prometheus