spring:
  application:
    name: Owing-Api

  profiles:
    default: local
    active: local
    group:
      prod: infrastructure, domain-entity, domain-node, common
      dev: infrastructure, domain-entity, domain-node, common
      local: infrastructure, domain-entity, domain-node, common
      test: infrastructure, domain-entity, domain-node, common

swagger:
  user: ${SWAGGER_USER}
  password: ${SWAGGER_PASSWORD}
---

spring:
  config:
    activate:
      on-profile: local

---

spring:
  config:
    activate:
      on-profile: test

---

springdoc:
  swagger-ui:
    path: /swagger-ui.html
google:
  oidc:
    audience: ${GOOGLE_OIDC_AUDIENCE}
jwt:
  secret: ${JWT_SECRET_KEY}